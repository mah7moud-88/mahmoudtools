<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>📊 Excel Paste Pro</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: "Segoe UI", Arial;
            background: #eef2f7;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 360px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
        }

        h2 {
            margin: 0;
            font-size: 16px;
        }

        .toggle-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 14px;
            font-weight: bold;
            background: rgba(22, 163, 74, 0.9);
        }

        .content {
            padding: 14px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            resize: none;
            font-size: 13px;
            box-sizing: border-box;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        button.action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 13px;
        }

        .upload-btn { background: #2563eb; }
        .clear-btn { background: #ef4444; }
        .paste-btn { background: #16a34a; }

        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .count {
            margin-top: 6px;
            font-size: 12px;
            color: #444;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #16a34a, #22c55e);
            transition: width 0.2s ease;
        }

        .collapsed .content {
            display: none;
        }
    </style>

</head>

<body>

    <div class="card" id="card">

        <div class="topbar">
            <h2>📊 Excel Paste Pro ⚡</h2>
            <button class="toggle-btn" id="toggle">−</button>
        </div>

        <div class="content">

            <textarea id="dataBox" placeholder="✍️ الصق أو ارفع ملف Excel هنا..."></textarea>

            <div class="row">
                <button id="uploadBtn" class="action upload-btn">📂 Upload</button>
                <button id="clearBtn" class="action clear-btn">🧹 Clear</button>
                <button id="run" class="action paste-btn">🚀 Paste</button>
            </div>

            <input type="file" id="fileInput" accept=".xlsx,.xls" hidden />

            <div class="status" id="status">🟢 Ready</div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="count">📊 Total: <span id="count">0</span></div>

        </div>

    </div>
<script>
alert("HTML is working");
</script>
</body>

</html>
