<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>📊 Excel Paste Pro</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: "Segoe UI", Arial;
            background: #eef2f7;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 360px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
        }

        h2 {
            margin: 0;
            font-size: 16px;
        }

        .content {
            padding: 14px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            resize: none;
            font-size: 13px;
            box-sizing: border-box;
        }

        /* REPEAT BOX STYLE */
        .repeat-wrapper {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .repeat-wrapper label {
            font-size: 13px;
            color: #374151;
            font-weight: 600;
            white-space: nowrap;
        }

        #repeatCount {
            width: 90px;
            padding: 7px 10px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            background: white;
        }

        #repeatCount:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        button.action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        button.action:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .upload-btn {
            background: #2563eb;
        }

        .clear-btn {
            background: #ef4444;
        }

        .paste-btn {
            background: #16a34a;
        }

        .stop-btn {
            background: #f59e0b;
        }

        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
        }

        .count {
            font-size: 12px;
            color: #444;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #16a34a, #22c55e);
            transition: width 0.2s ease;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="topbar">
            <h2>📊 Excel Paste Pro ⚡</h2>
        </div>

        <div class="content">

            <textarea id="dataBox"
                placeholder="✍️ الصق أو ارفع ملف Excel هنا..."></textarea>

            <!-- SMALL & MODERN REPEAT BOX -->
            <div class="repeat-wrapper">
                <label for="repeatCount">🔁 Repeat</label>

                <input id="repeatCount"
                    type="number"
                    min="0"
                    value="0">
            </div>

            <div class="row">
                <button id="uploadBtn" class="action upload-btn">📂 Upload</button>
                <button id="clearBtn" class="action clear-btn">🧹 Clear</button>
                <button id="run" class="action paste-btn">🚀 Paste</button>
                <button id="stopBtn" class="action stop-btn">⛔ Stop</button>
            </div>

            <input type="file" id="fileInput" accept=".xlsx,.xls" hidden />

            <div class="status" id="status">🟢 Ready</div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="stats-row">
                <div class="count">
                    📊 Total: <span id="count">0</span>
                </div>

                <div class="count">
                    📥 Live Count: <span id="liveCount">0</span>
                </div>
            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
