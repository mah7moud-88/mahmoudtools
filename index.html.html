<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8" />
<title>📊 Excel Paste Pro</title>

<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #eef2f7;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.card {
    width: 360px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    overflow: hidden;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
}

h2 {
    margin: 0;
    font-size: 16px;
}

.content {
    padding: 14px;
}

textarea {
    width: 100%;
    height: 180px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    resize: none;
    font-size: 13px;
    box-sizing: border-box;
}

/* REPEAT WRAPPER */
.repeat-wrapper {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 10px 12px;
}

/* INPUT */
#repeatCount {
    width: 90px;
    padding: 7px 10px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 13px;
}

/* 🔥 CHECK BUTTON (same style but added fix) */
.check-btn {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: 600;
    transition: all 0.2s ease;
    flex: none;
    width: 85px;
    height: 34px;
    box-shadow: 0 4px 10px rgba(99, 102, 241, 0.25);
}

.check-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(99, 102, 241, 0.35);
}

.check-btn:active {
    transform: scale(0.97);
}

/* BUTTONS */
.row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
}

button.action {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-size: 13px;
}

.upload-btn { background: #2563eb; }
.clear-btn { background: #ef4444; }
.paste-btn { background: #16a34a; }
.stop-btn { background: #f59e0b; }

/* PROGRESS */
.progress-container {
    width: 100%;
    height: 8px;
    background: #e5e7eb;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg,#16a34a,#22c55e);
    transition: width 0.2s ease;
}

/* STATUS */
.status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    color: #666;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    background: #f8fafc;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    margin-top: 10px;
}

.dashboard div {
    min-width: 70px;
    text-align: center;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<h2>📊 Excel Paste Pro ⚡</h2>
</div>

<div class="content">

<textarea id="dataBox" placeholder="✍️ الصق أو ارفع ملف Excel هنا..."></textarea>

<!-- REPEAT + CHECK (UNCHANGED STRUCTURE) -->
<div class="repeat-wrapper">

<label>🔁 Repeat</label>

<input id="repeatCount" type="number" min="0" value="0">

<button id="checkBtn" class="check-btn">🔍 Check</button>

</div>

<!-- MAIN BUTTONS -->
<div class="row">
<button id="uploadBtn" class="action upload-btn">📂 Upload</button>
<button id="clearBtn" class="action clear-btn">🧹 Clear</button>
<button id="run" class="action paste-btn">🚀 Paste</button>
<button id="stopBtn" class="action stop-btn">⛔ Stop</button>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls" hidden />

<div class="status" id="status">🟢 Ready</div>

<div class="dashboard">
<div>📥 <span id="loadedCount">0</span></div>
<div>📊 <span id="totalDash">0</span></div>
<div>⚡ <span id="progressDash">0%</span></div>
<div>⏱️ <span id="timeDash">0s</span></div>
</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
