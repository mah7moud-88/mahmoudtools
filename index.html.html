<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8" />
<title>📊 Excel Paste Pro</title>

<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #eef2f7;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.card {
    width: 360px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    overflow: hidden;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
}

h2 {
    margin: 0;
    font-size: 16px;
}

.content {
    padding: 14px;
}

textarea {
    width: 100%;
    height: 180px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    resize: none;
    font-size: 13px;
    box-sizing: border-box;
}

/* REPEAT */
.repeat-wrapper {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 12px;
    width: 100%;
    box-sizing: border-box;
}

.repeat-label {
    font-weight: 600;
    font-size: 13px;
    color: #374151;
    white-space: nowrap;
}

#repeatCount {
    flex: 1;
    min-width: 0;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 13px;
}

/* BUTTONS */
.row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
}

button.action {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-size: 13px;
}

.upload-btn { background: #2563eb; }
.clear-btn { background: #ef4444; }
.paste-btn { background: #16a34a; }
.stop-btn { background: #f59e0b; }

/* PROGRESS */
.progress-container {
    width: 100%;
    height: 8px;
    background: #e5e7eb;
    border-radius: 20px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg,#16a34a,#22c55e);
    transition: width 0.2s ease;
}

/* FILTER + CHECK ROW */
.filter-toggle {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: #f8fafc;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 10px 12px;
}

/* SWITCH */
.switch {
    position: relative;
    display: inline-block;
    width: 46px;
    height: 24px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #cbd5e1;
    transition: .3s;
    border-radius: 50px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: #2563eb;
}

input:checked + .slider:before {
    transform: translateX(22px);
}

/* CHECK BUTTON */
.check-btn {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: 600;
}

/* STATUS */
.status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    color: #666;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    background: #f8fafc;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid #e5e7eb;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<h2>📊 Excel Paste Pro ⚡</h2>
</div>

<div class="content">

<textarea id="dataBox" placeholder="✍️ الصق أو ارفع ملف Excel هنا..."></textarea>

<!-- REPEAT -->
<div class="repeat-wrapper">

<span class="repeat-label">🔁 Repeat</span>

<input id="repeatCount" type="number" min="0" value="0">

</div>

<div class="row">
<button id="uploadBtn" class="action upload-btn">📂 Upload</button>
<button id="clearBtn" class="action clear-btn">🧹 Clear</button>
<button id="run" class="action paste-btn">🚀 Paste</button>
<button id="stopBtn" class="action stop-btn">⛔ Stop</button>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls" hidden />

<div class="status" id="status">🟢 Ready</div>

<div class="dashboard">
<div>📥 <span id="loadedCount">0</span></div>
<div>📊 <span id="totalDash">0</span></div>
<div>⚡ <span id="progressDash">0%</span></div>
<div>⏱️ <span id="timeDash">0s</span></div>
</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<!-- FILTER + CHECK -->
<div class="filter-toggle">

<label class="switch">
<input type="checkbox" id="filterMode" checked>
<span class="slider"></span>
</label>

<span id="filterLabel">🔍 Filter Mode</span>

<button id="checkBtn" class="check-btn">🔍 Check</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
