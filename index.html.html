<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>📊 Excel Paste Pro</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: "Segoe UI", Arial;
            background:
                linear-gradient(135deg, #dbeafe, #eef2ff, #f0fdf4);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 360px;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .topbar {
            padding: 16px;
        }

        .title-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb, #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.25);
        }

        h2 {
            margin: 0;
            font-size: 16px;
            color: #111827;
        }

        .content {
            padding: 14px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            resize: none;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.9);
        }

        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        /* REPEAT BOX */

        .repeat-wrapper {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .repeat-wrapper label {
            font-size: 13px;
            color: #374151;
            font-weight: 600;
            white-space: nowrap;
        }

        #repeatCount {
            width: 90px;
            padding: 7px 10px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
            background: white;
        }

        #repeatCount:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* BUTTONS */

        .row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        button.action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: 0.25s;
            font-weight: 600;
        }

        button.action:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upload-btn {
            background: #2563eb;
        }

        .clear-btn {
            background: #ef4444;
        }

        .paste-btn {
            background: #16a34a;
        }

        .stop-btn {
            background: #f59e0b;
        }

        /* STATUS */

        .status {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            color: #64748b;
        }

        .status.success {
            color: #16a34a;
        }

        .status.error {
            color: #dc2626;
        }

        .status.running {
            color: #2563eb;
        }

        /* PROGRESS BAR */

        .progress-container {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background:
                linear-gradient(90deg, #16a34a, #22c55e);
            transition:
                width 0.35s cubic-bezier(.4, 2, .6, 1);
        }

        /* COUNTS */

        .stats-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            text-align: center;
            flex-wrap: wrap;
        }

        .count {
            font-size: 11px;
            color: #444;
            background: #f8fafc;
            padding: 5px 8px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            min-width: 95px;
        }

        .count span {
            font-weight: bold;
            color: #111827;
            transition: 0.2s;
        }

        /* PASTE ANIMATION */

        .pasting {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.04);
            }

            100% {
                transform: scale(1);
            }
        }

        /* DARK MODE */

        @media (prefers-color-scheme: dark) {

            body {
                background: #0f172a;
            }

            .card {
                background: rgba(15, 23, 42, 0.82);
                color: white;
            }

            h2 {
                color: white;
            }

            textarea,
            #repeatCount {
                background: #1e293b;
                color: white;
                border-color: #334155;
            }

            .count,
            .repeat-wrapper {
                background: #1e293b;
                border-color: #334155;
                color: white;
            }

            .count span {
                color: white;
            }

            .status {
                color: #cbd5e1;
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- HEADER -->

        <div class="topbar">

            <div class="title-box">

                <div class="logo">
                    ⚡
                </div>

                <h2>Excel Paste Pro</h2>

            </div>

        </div>

        <!-- CONTENT -->

        <div class="content">

            <!-- TEXTAREA -->

            <textarea id="dataBox"
                placeholder="✍️ الصق أو ارفع ملف Excel هنا..."></textarea>

            <!-- REPEAT -->

            <div class="repeat-wrapper">

                <label for="repeatCount">
                    🔁 Repeat
                </label>

                <input id="repeatCount"
                    type="number"
                    min="0"
                    value="0">

            </div>

            <!-- BUTTONS -->

            <div class="row">

                <button id="uploadBtn"
                    class="action upload-btn">
                    📂 Upload
                </button>

                <button id="clearBtn"
                    class="action clear-btn">
                    🧹 Clear
                </button>

                <button id="run"
                    class="action paste-btn">
                    🚀 Paste
                </button>

                <button id="stopBtn"
                    class="action stop-btn">
                    ⛔ Stop
                </button>

            </div>

            <!-- FILE INPUT -->

            <input type="file"
                id="fileInput"
                accept=".xlsx,.xls"
                hidden />

            <!-- STATUS -->

            <div class="status"
                id="status">
                🟢 Ready
            </div>

            <!-- PROGRESS -->

            <div class="progress-container">

                <div class="progress-bar"
                    id="progressBar"></div>

            </div>

            <!-- COUNTS -->

            <div class="stats-row">

                <div class="count">
                    📊 Total:
                    <span id="count">0</span>
                </div>

                <div class="count">
                    📥 Live Count:
                    <span id="liveCount">0</span>
                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
