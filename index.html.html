<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8" />
<title>📊 Excel Paste Pro</title>

<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #eef2f7;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.card {
    width: 360px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    overflow: hidden;
}

.topbar {
    display: flex;
    justify-content: space-between;
    padding: 14px;
}

.content { padding: 14px; }

textarea {
    width: 100%;
    height: 180px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
}

.repeat-wrapper {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
}

#repeatCount {
    width: 90px;
    padding: 6px;
}

button.action {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.upload-btn { background: #2563eb; }
.clear-btn { background: #ef4444; }
.paste-btn { background: #16a34a; }
.stop-btn { background: #f59e0b; }

.progress-container {
    margin-top: 10px;
    height: 8px;
    background: #eee;
    border-radius: 20px;
    overflow: hidden;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: #22c55e;
}

/* SEARCH */
.search-btn {
    margin-top: 12px;
    width: 100%;
    background: #0ea5e9;
}

.search-box {
    display: none;
    margin-top: 10px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 10px;
}

.search-box input {
    width: 100%;
    padding: 8px;
    margin-bottom: 8px;
}

.search-box button {
    width: 100%;
    padding: 8px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 8px;
}

.status {
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<h2>📊 Excel Paste Pro</h2>
</div>

<div class="content">

<textarea id="dataBox"></textarea>

<div class="repeat-wrapper">
<input id="repeatCount" type="number" value="0">
<button id="checkBtn">🔍</button>
</div>

<div style="display:flex; gap:10px; margin-top:10px;">
<button id="uploadBtn" class="action upload-btn">Upload</button>
<button id="clearBtn" class="action clear-btn">Clear</button>
<button id="run" class="action paste-btn">Paste</button>
<button id="stopBtn" class="action stop-btn">Stop</button>
</div>

<div class="status" id="status">Ready</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<!-- SEARCH -->
<button id="searchBtn" class="action search-btn">Search</button>

<div id="searchBox" class="search-box">
    <input id="searchInput" placeholder="اكتب الرقم..." />
    <button id="doSearchBtn">بحث</button>
</div>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
